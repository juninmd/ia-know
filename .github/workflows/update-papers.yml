name: Update AI Papers

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      DB_PATH: ${{ runner.temp }}/pac-memory.db
      LLM_PROVIDER: ollama
      PAPER_AGGREGATOR_ENABLED: "true"
      PAPER_AGGREGATOR_MAX_ITEMS: "100"
      IA_KNOW_REPO_URL: https://github.com/juninmd/ia-know.git
      IA_KNOW_REPO_PATH: ${{ github.workspace }}
      IA_KNOW_AUTO_PUSH: "true"

    steps:
      - name: Checkout IA Know
        uses: actions/checkout@v4

      - name: Checkout PAC Memory
        uses: actions/checkout@v4
        with:
          repository: juninmd/pac-memory
          path: pac-memory

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: pac-memory/pnpm-lock.yaml

      - name: Install PAC Memory dependencies
        working-directory: pac-memory
        run: pnpm install --frozen-lockfile

      - name: Collect latest AI/LLM papers
        working-directory: pac-memory
        run: pnpm tsx src/cli/index.ts papers

      - name: Publish generated paper catalog
        working-directory: pac-memory
        run: pnpm tsx src/cli/index.ts publish-ia-know
